<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>GPU Data Timeline</title>
<style>
  :root{
    --bg:#f8fafc;
    --panel:#ffffff;
    --text:#111827;
    --muted:#6b7280;
    --border:#d1d5db;
    --headerH:40px;
    --rowH:18px;
    --topbarH:58px;
    --leftW:380px;
  }

  *{ box-sizing:border-box; }
  html, body{ height:100%; }

  body{
    margin:0;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:var(--bg);
    color:var(--text);
  }

  .topbar{
    height:var(--topbarH);
    display:flex;
    gap:12px;
    align-items:center;
    padding:10px 14px;
    background:var(--panel);
    border-bottom:1px solid var(--border);
    overflow-x:auto;
    white-space:nowrap;
  }

  .topbar input[type="text"]{
    min-width:260px;
    padding:6px 28px 6px 8px;
  }

  .searchWrap{
    position:relative;
    display:inline-flex;
    align-items:center;
  }

  .clearSearchBtn{
    position:absolute;
    right:6px;
    width:18px;
    height:18px;
    border:none;
    border-radius:999px;
    background:#e5e7eb;
    color:#374151;
    cursor:pointer;
    font:inherit;
    line-height:18px;
    padding:0;
  }

  .clearSearchBtn:hover{
    background:#d1d5db;
  }

  .topbar label{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:14px;
    white-space:nowrap;
  }

  .small{ color:var(--muted); font-size:12px; }
  .legend{ color:var(--muted); font-size:12px; }

  .viewer{
    display:grid;
    grid-template-columns:var(--leftW) 1fr;
    grid-template-rows:var(--headerH) minmax(0,1fr) 16px;
    height:calc(100vh - var(--topbarH));
    min-height:0;
    overflow:hidden;
  }

  .leftHeader,
  .rightHeader{
    height:var(--headerH);
    display:flex;
    align-items:center;
    padding:0 12px;
    border-bottom:1px solid var(--border);
    background:var(--panel);
    position:sticky;
    top:0;
    z-index:20;
  }

  .leftHeader{
    grid-column:1;
    grid-row:1;
    border-right:1px solid var(--border);
    font-weight:600;
  }

  .rightHeader{
    grid-column:2;
    grid-row:1;
    padding:0;
    overflow:hidden;
  }

  .tickViewport{
    width:100%;
    height:100%;
    overflow:hidden;
    position:relative;
    background:var(--panel);
    cursor:crosshair;
    user-select:none;
  }

  .headerSelection{
    position:absolute;
    top:0;
    bottom:0;
    background:rgba(59,130,246,.12);
    border:1px solid rgba(59,130,246,.35);
    pointer-events:none;
    z-index:25;
  }

  .endShade{
    position:absolute;
    top:0;
    bottom:0;
    background:rgba(107,114,128,.16);
    pointer-events:none;
  }

  .bodyScroller{
    grid-column:1 / span 2;
    grid-row:2;
    display:grid;
    grid-template-columns:var(--leftW) 1fr;
    overflow-y:auto;
    overflow-x:hidden;
    min-height:0;
    height:100%;
    background:var(--panel);
    align-items:start;
    scrollbar-gutter:stable;
  }

  .leftBody{
    border-right:1px solid var(--border);
    overflow-x:auto;
    overflow-y:hidden;
    background:var(--panel);
    min-height:100%;
    scrollbar-width:none;
  }

  .leftBody::-webkit-scrollbar,
  .rightBody::-webkit-scrollbar{
    height:0;
    width:0;
  }

  .leftBottomScrollSpacer{
    grid-column:1;
    grid-row:3;
    overflow-x:auto;
    overflow-y:hidden;
    border-top:1px solid var(--border);
    background:var(--panel);
  }

  .leftBottomScrollInner,
  .bottomScrollInner{
    height:1px;
  }

  .leftInner{
    position:relative;
    min-width:max-content;
  }

  .rightBody{
    position:relative;
    overflow-x:auto;
    overflow-y:auto;
    background:var(--panel);
    min-width:0;
    min-height:100%;
    scrollbar-width:none;
  }

  .bottomScrollWrap{
    grid-column:2;
    grid-row:3;
    overflow-x:auto;
    overflow-y:hidden;
    border-top:1px solid var(--border);
    background:var(--panel);
  }

  .tickContent,
  .timelineLayer{
    position:relative;
  }

  .tickContent{
    height:100%;
    will-change:transform;
  }

  .rowLabel{
    height:var(--rowH);
    display:flex;
    align-items:center;
    gap:6px;
    padding:0 8px;
    border-bottom:1px solid #f1f5f9;
    min-width:max-content;
    background:#fff;
  }

  .rowLabel:hover{ background:#f8fafc; }
  .rowLabel.matchRow{ background:#fde68a; }
  .rowLabel.matchRow:hover{ background:#fcd34d; }
  .timelineRow.matchRow{ background:#fde68a; }
  .timelineRow.matchRow:hover{ background:#fcd34d; }
  .groupRow{ background:#fcfcfd; }
  .childRow{ padding-left:22px; }

  .swatch{
    width:10px;
    height:10px;
    border-radius:3px;
    border:1px solid #94a3b8;
    flex:0 0 10px;
  }

  .swatch.leak{
    border:1px solid #dc2626;
  }

  .swatch.mediumConfidence{
    opacity:.6;
  }

  .swatch.lowConfidence{
    opacity:.3;
  }

  .swatch.leak{
    border:2px solid #dc2626;
  }

  .leftText{
    min-width:0;
    display:flex;
    flex-direction:column;
    line-height:1.15;
  }

  .name{
    font-size:13px;
    display:flex;
    gap:8px;
    align-items:center;
    min-width:0;
  }

  .nameMain{
    min-width:0;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  .nameSuffix{ color:rgba(17,24,39,.5); }

  .badge{
    display:inline-block;
    font-size:11px;
    padding:1px 6px;
    border-radius:999px;
    background:#eef2ff;
    color:#4338ca;
    border:1px solid #c7d2fe;
  }

  .toggleBtn{
    width:11px;
    height:11px;
    border:1px solid #cbd5e1;
    border-radius:3px;
    background:#fff;
    color:#334155;
    cursor:pointer;
    flex:0 0 11px;
    line-height:9px;
    padding:0;
    font-size:9px;
  }

  .togglePlaceholder{
    width:11px;
    height:11px;
    flex:0 0 11px;
  }

  .timelineRow{
    position:relative;
    height:var(--rowH);
    border-bottom:1px solid #f1f5f9;
    background:#fff;
  }

  .timelineRow:hover{ background:#f8fafc; }

  .eventBar{
    position:absolute;
    top:2px;
    height:calc(var(--rowH) - 4px);
    border-radius:4px;
    border:2px solid rgba(15,23,42,.22);
    overflow:hidden;
    white-space:nowrap;
    text-overflow:ellipsis;
    padding:0 3px;
    font-size:9px;
    line-height:calc(var(--rowH) - 6px);
    color:#0f172a;
  }

  .eventBar.aggregate{
    opacity:1;
    mix-blend-mode:normal;
  }

  .eventBar.noEnd{
    border:2px solid #dc2626;
  }

  .eventBar.mediumConfidence{
    opacity:.6;
  }

  .eventBar.lowConfidence{
    opacity:.3;
  }

  .bodySelection{
    position:absolute;
    top:0;
    bottom:0;
    background:rgba(59,130,246,.10);
    border-left:1px solid rgba(59,130,246,.28);
    border-right:1px solid rgba(59,130,246,.28);
    pointer-events:none;
    z-index:15;
  }

  .gridLine{
    position:absolute;
    top:0;
    bottom:0;
    width:1px;
    background:#e5e7eb;
  }

  .tickLabel{
    position:absolute;
    top:10px;
    transform:translateX(-50%);
    font-size:11px;
    color:var(--muted);
    white-space:nowrap;
  }

  .tooltip{
    position:fixed;
    z-index:1000;
    pointer-events:none;
    background:#111827;
    color:#fff;
    padding:8px 10px;
    border-radius:8px;
    font-size:12px;
    max-width:420px;
    box-shadow:0 10px 30px rgba(0,0,0,.18);
    opacity:0;
    transition:opacity .08s linear;
  }

  .tooltipLineAlert{
    color:#f87171;
    font-weight:600;
  }

  .contextMenu{
    position:fixed;
    z-index:1100;
    min-width:160px;
    background:#fff;
    border:1px solid var(--border);
    border-radius:8px;
    box-shadow:0 10px 30px rgba(0,0,0,.16);
    padding:6px;
  }

  .contextMenu button{
    width:100%;
    text-align:left;
    border:none;
    background:transparent;
    padding:8px 10px;
    border-radius:6px;
    cursor:pointer;
    font:inherit;
    color:var(--text);
  }

  .contextMenu button:hover{ background:#f3f4f6; }

  .directiveModal{
    position:fixed;
    inset:0;
    z-index:1200;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(15,23,42,.32);
    padding:24px;
  }

  .directivePanel{
    width:min(900px, 92vw);
    max-height:80vh;
    background:#fff;
    border:1px solid var(--border);
    border-radius:12px;
    box-shadow:0 18px 50px rgba(0,0,0,.22);
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }

  .directiveHeader{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:12px 14px;
    border-bottom:1px solid var(--border);
    font-weight:600;
  }

  .directiveActions{ display:flex; gap:8px; }

  .directiveActionBtn{
    border:1px solid var(--border);
    background:#fff;
    border-radius:8px;
    padding:6px 10px;
    cursor:pointer;
    font:inherit;
    color:var(--text);
  }

  .directiveBody{ padding:14px; overflow:auto; }

  .directivePre{
    margin:0;
    white-space:pre-wrap;
    word-break:break-word;
    font:12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    color:#111827;
  }

  .moreRowHint{
    font-size:11px;
    color:var(--muted);
  }

  .hidden{ display:none !important; }
</style>
</head>
<body>
<div class="topbar">
  <label>JSON file
    <input id="fileInput" type="file" accept=".json,application/json" />
  </label>
  <label>Search
    <span class="searchWrap">
      <input id="searchInput" type="text" placeholder="name, file, function, address" />
      <button id="clearSearchBtn" type="button" class="clearSearchBtn hidden" aria-label="Clear search">×</button>
    </span>
  </label>
  <span id="matchCount" class="small"></span>
  <label>Sort
    <select id="sortMode">
      <option value="alpha">alphabetical</option>
      <option value="first">first appearance</option>
      <option value="instance">instance appearance</option>
    </select>
  </label>
  <label>Rank
    <select id="rankFilter"></select>
  </label>
  <label>Confidence
    <select id="confidenceFilter">
      <option value="high" selected>high</option>
      <option value="medium">medium</option>
      <option value="low">low</option>
    </select>
  </label>
  <label><input id="zoomOutBtn" type="button" value="−" /></label>
  <label><input id="fitBtn" type="button" value="fit" /></label>
  <label><input id="zoomInBtn" type="button" value="+" /></label>
  <span id="summary" class="small"></span>
</div>

<div class="viewer">
  <div class="leftHeader">Allocations</div>
  <div class="rightHeader">
    <div id="tickViewport" class="tickViewport">
      <div id="tickContent" class="tickContent"></div>
      <div id="headerEndShade" class="endShade"></div>
      <div id="headerSelection" class="headerSelection hidden"></div>
    </div>
  </div>

  <div id="bodyScroller" class="bodyScroller">
    <div id="leftBody" class="leftBody"><div id="leftInner" class="leftInner"></div></div>
    <div id="rightBody" class="rightBody"><div id="timelineLayer" class="timelineLayer"></div></div>
  </div>
  <div id="leftBottomScrollWrap" class="leftBottomScrollSpacer"><div id="leftBottomScrollInner" class="leftBottomScrollInner"></div></div>
  <div id="bottomScrollWrap" class="bottomScrollWrap"><div id="bottomScrollInner" class="bottomScrollInner"></div></div>
</div>

<div id="tooltip" class="tooltip"></div>
<div id="contextMenu" class="contextMenu hidden">
  <button id="copyPathBtn" type="button">Copy path</button>
  <button id="copyAddrBtn" type="button">Copy data address</button>
  <button id="maskOccurrencesBtn" type="button">Mask all occurrences</button>
  <button id="inspectDirectiveBtn" type="button">Inspect ACC directive</button>
</div>
<div id="directiveModal" class="directiveModal hidden">
  <div class="directivePanel">
    <div class="directiveHeader">
      <span>ACC directive</span>
      <div class="directiveActions">
        <button id="copyDirectiveBtn" class="directiveActionBtn" type="button">Copy</button>
        <button id="closeDirectiveBtn" class="directiveActionBtn" type="button">Close</button>
      </div>
    </div>
    <div class="directiveBody"><pre id="directiveText" class="directivePre"></pre></div>
  </div>
</div>

<script>
const PX_PER_ROW = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--rowH')) || 18;
const LEFT_BG = ['#dbeafe','#dcfce7','#fef3c7','#fee2e2','#ede9fe','#cffafe','#fce7f3','#e2e8f0'];
const UNROLL_STEP = 10;
const MIN_DRAG_PX = 8;
const ROW_BUFFER_PX = 600;
const TICK_BUFFER_PX = 300;
const CHILD_INDENT_ALLOWANCE_PX = 22;
const EXTRA_UNROLL_ALLOWANCE_PX = 18;

const fileInput = document.getElementById('fileInput');
const searchInput = document.getElementById('searchInput');
const clearSearchBtn = document.getElementById('clearSearchBtn');
const matchCountEl = document.getElementById('matchCount');
const sortMode = document.getElementById('sortMode');
const rankFilter = document.getElementById('rankFilter');
const confidenceFilter = document.getElementById('confidenceFilter');
const zoomOutBtn = document.getElementById('zoomOutBtn');
const fitBtn = document.getElementById('fitBtn');
const zoomInBtn = document.getElementById('zoomInBtn');
const summaryEl = document.getElementById('summary');
const bodyScroller = document.getElementById('bodyScroller');
const leftBody = document.getElementById('leftBody');
const leftInner = document.getElementById('leftInner');
const rightBody = document.getElementById('rightBody');
const timelineLayer = document.getElementById('timelineLayer');
const tickViewport = document.getElementById('tickViewport');
const tickContent = document.getElementById('tickContent');
const headerSelection = document.getElementById('headerSelection');
const headerEndShade = document.getElementById('headerEndShade');
const leftBottomScrollWrap = document.getElementById('leftBottomScrollWrap');
const leftBottomScrollInner = document.getElementById('leftBottomScrollInner');
const bottomScrollWrap = document.getElementById('bottomScrollWrap');
const bottomScrollInner = document.getElementById('bottomScrollInner');
const tooltip = document.getElementById('tooltip');
const contextMenu = document.getElementById('contextMenu');
const copyPathBtn = document.getElementById('copyPathBtn');
const copyAddrBtn = document.getElementById('copyAddrBtn');
const maskOccurrencesBtn = document.getElementById('maskOccurrencesBtn');
const inspectDirectiveBtn = document.getElementById('inspectDirectiveBtn');
const directiveModal = document.getElementById('directiveModal');
const directiveText = document.getElementById('directiveText');
const copyDirectiveBtn = document.getElementById('copyDirectiveBtn');
const closeDirectiveBtn = document.getElementById('closeDirectiveBtn');

const bodySelection = document.createElement('div');
bodySelection.id = 'bodySelection';
bodySelection.className = 'bodySelection hidden';
const bodyEndShade = document.createElement('div');
bodyEndShade.id = 'bodyEndShade';
bodyEndShade.className = 'endShade';
timelineLayer.appendChild(bodyEndShade);
timelineLayer.appendChild(bodySelection);

let rawData = null;
let renderedRows = [];
let timeMin = 0;
let timeMax = 1;
let pxPerTime = 0.2;
let expandedCounts = new Map();
let hoverRAF = null;
let metaEndT = null;
let displayMaxT = null;
let hoverTimer = null;
let hoverX = 0;
let hoverY = 0;
let hoverHTML = "";
let renderRAF = null;
let contextPath = '';
let contextAddr = '';
let contextMaskKey = '';
let contextDirective = '';
let maskedGroupKeys = new Set();
let dragZoom = null;
let pendingSearchFocus = false;
let cachedLeftInnerWidth = null;
let leftWidthDirty = true;

function escapeHtml(s){
  return String(s ?? '')
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;');
}

function fmtBytes(n){
  if (n == null || Number.isNaN(+n)) return '';
  const u = ['B','KB','MB','GB','TB'];
  let v = +n, i = 0;
  while (v >= 1024 && i < u.length - 1){ v /= 1024; i++; }
  return `${v.toFixed(v >= 10 || i === 0 ? 0 : 1)} ${u[i]}`;
}

function fmtTime(x){
  if (x == null || !Number.isFinite(+x)) return '—';
  const v = +x;
  const a = Math.abs(v);
  if (a >= 1) return `${v.toFixed(3).replace(/\.000$/,'')} s`;
  if (a >= 1e-3) return `${(v * 1e3).toFixed(3).replace(/\.000$/,'')} ms`;
  if (a >= 1e-6) return `${(v * 1e6).toFixed(3).replace(/\.000$/,'')} µs`;
  return `${(v * 1e9).toFixed(3).replace(/\.000$/,'')} ns`;
}

function colorForKey(key){
  let h = 0;
  const s = String(key || '');
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
  return LEFT_BG[h % LEFT_BG.length];
}

function splitDisplayName(name){
  const s = String(name ?? '');
  const idx = s.indexOf('$');
  return idx < 0 ? { main:s, suffix:'' } : { main:s.slice(0, idx), suffix:s.slice(idx) };
}

function borderColorForFill(fill){
  const m = String(fill).match(/^#([0-9a-f]{6})$/i);
  if (!m) return 'rgba(15,23,42,.28)';
  const hex = m[1];
  const r = Math.max(0, parseInt(hex.slice(0,2),16) - 55);
  const g = Math.max(0, parseInt(hex.slice(2,4),16) - 55);
  const b = Math.max(0, parseInt(hex.slice(4,6),16) - 55);
  return `rgb(${r},${g},${b})`;
}

function allocSiteKey(ev){ return `${ev.file || ''}|${ev.line || ''}`; }
function allocIdentityKey(ev){ return `${allocSiteKey(ev)}|${ev.addr || ''}`; }
function displayGroupKey(ev){ return `${ev.name || ''}|${ev.file || ''}|${ev.line || ''}`; }

function getEventEnd(ev){
  return Number.isFinite(ev.end) ? ev.end : (Number.isFinite(metaEndT) ? metaEndT : timeMax);
}

function getDisplaySpan(){
  return Math.max(1e-12, timeMax - timeMin);
}

function getTrackConfidenceBucket(ev){
  if (ev.track_kind !== 'reuse') return 'high';
  return ev.inferred_confidence || 'low';
}

function passesConfidenceFilter(ev){
  const level = confidenceFilter.value || 'low';
  const bucket = getTrackConfidenceBucket(ev);
  if (level === 'high') return bucket === 'high';
  if (level === 'medium') return bucket === 'high' || bucket === 'medium';
  return true;
}

function eventMatches(ev, q){
  if (!q) return true;
  const hay = [ev.name, ev.file, ev.function, ev.site_label, ev.addr].join(' | ').toLowerCase();
  return hay.includes(q);
}

function getRowPath(row){
  if (!row) return '';
  if (row.type === 'group') return `${row.group?.file || '—'}:${row.group?.line ?? '—'}`;
  const first = row.rows?.[0] || {};
  return `${first.file || row.group?.file || '—'}:${first.line ?? row.group?.line ?? '—'}`;
}

function getEventColor(ev, row){
  return row?.color || colorForKey(ev.site_key || ev.addr || ev.name);
}

function getEventTooltip(ev, row){
  const path = `${row?.group?.file || ev.file || '—'}:${row?.group?.line ?? ev.line ?? '—'}`;
  const routine = row?.group?.function || ev.function || '—';
  const rankValues = row?.type === 'group'
    ? [...new Set((row.rows || []).map(x => x.rank).filter(v => v != null))].sort((a,b)=>a-b)
    : (ev.rank != null ? [ev.rank] : []);
  const rankText = rankValues.length ? rankValues.join(', ') : '—';
  const endLine = ev.end == null
    ? 'end: <span class="tooltipLineAlert">not deallocated</span>'
    : `end: ${escapeHtml(fmtTime(ev.end))}`;
  const conf = ev.track_kind === 'first_alloc' ? 'exact' : (ev.inferred_confidence || 'low');
  return `
    <div>path: ${escapeHtml(path)}</div>
    <div>routine: ${escapeHtml(routine)}</div>
    <div>rank: ${escapeHtml(rankText)}</div>
    <div>confidence: ${escapeHtml(conf)}</div>
    <div>size: ${escapeHtml(fmtBytes(ev.size))}</div>
    <div>addr: ${escapeHtml(ev.addr || '—')}</div>
    <div>start: ${escapeHtml(fmtTime(ev.start))}</div>
    <div>${endLine}</div>
  `;
}

async function copyText(text){
  try {
    await navigator.clipboard.writeText(text);
    return true;
  } catch {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    let ok = false;
    try { ok = document.execCommand('copy'); } catch {}
    ta.remove();
    return ok;
  }
}

function openContextMenu(x, y, path, addr = '', maskKey = '', directive = ''){
  contextPath = path || '';
  contextAddr = addr || '';
  contextMaskKey = maskKey || '';
  contextDirective = directive || '';
  copyPathBtn.classList.toggle('hidden', !contextPath);
  copyAddrBtn.classList.toggle('hidden', !contextAddr);
  maskOccurrencesBtn.classList.toggle('hidden', !contextMaskKey);
  inspectDirectiveBtn.classList.toggle('hidden', !contextDirective);
  contextMenu.style.left = `${x}px`;
  contextMenu.style.top = `${y}px`;
  contextMenu.classList.remove('hidden');
  const rect = contextMenu.getBoundingClientRect();
  const margin = 8;
  let left = x;
  let top = y;
  if (rect.right > window.innerWidth - margin) left = Math.max(margin, x - rect.width);
  if (rect.bottom > window.innerHeight - margin) top = Math.max(margin, y - rect.height);
  contextMenu.style.left = `${left}px`;
  contextMenu.style.top = `${top}px`;
}

function closeContextMenu(){ contextMenu.classList.add('hidden'); }
function openDirectiveModal(text){ directiveText.textContent = text || 'No ACC directive text available for this entry.'; directiveModal.classList.remove('hidden'); }
function closeDirectiveModal(){ directiveModal.classList.add('hidden'); }

function groupEventsForDisplay(events){
  const grouped = new Map();
  for (const ev of events){
    const gk = displayGroupKey(ev);
    if (!grouped.has(gk)) {
      grouped.set(gk, {
        name: ev.name,
        file: ev.file,
        line: ev.line,
        function: ev.function,
        site_label: ev.site_label,
        directive_text: ev.directive_text,
        _groupKey: gk,
        rows: []
      });
    }
    grouped.get(gk).rows.push(ev);
  }

  return [...grouped.values()].map((g, idx) => ({
    ...g,
    _color: LEFT_BG[idx % LEFT_BG.length],
    _firstSeq: Math.min(...g.rows.map(ev => ev._seq ?? Number.MAX_SAFE_INTEGER)),
    _firstStart: Math.min(...g.rows.map(ev => Number.isFinite(ev.start) ? ev.start : Number.POSITIVE_INFINITY)),
    rows: g.rows.slice().sort((a,b) => {
      const sa = a.start ?? -Infinity;
      const sb = b.start ?? -Infinity;
      if (sa !== sb) return sa - sb;
      return (a._seq ?? 0) - (b._seq ?? 0);
    })
  }));
}

function normalizeData(data){
  if (!data || !Array.isArray(data.tracks)) throw new Error('Expected top-level { tracks: [...] } JSON');

  const allEvents = data.tracks.map((ev, idx) => ({
    ...ev,
    _seq: idx,
    name: ev.name ?? 'unnamed',
    file: ev.file ?? '',
    line: ev.line ?? '',
    function: ev.function ?? '',
    site_label: ev.site_label ?? '',
    directive_text: ev.directive_text ?? '',
    rank: ev.rank ?? null,
    track_kind: ev.track_kind ?? 'first_alloc',
    inferred_confidence: ev.inferred_confidence ?? null,
  }));

  const rows = groupEventsForDisplay(allEvents);

  const starts = [];
  const ends = [];
  for (const ev of allEvents){
    if (Number.isFinite(ev.start)) starts.push(ev.start);
    if (Number.isFinite(ev.end)) ends.push(ev.end);
  }

  let minT = starts.length ? Math.min(...starts) : 0;
  const computedEndT = ends.length ? Math.max(...ends) + 1.0 : 1.0;
  const logicalEndT = Number.isFinite(data?.meta?.end_t) ? data.meta.end_t : computedEndT;
  let maxT = logicalEndT;
  if (!(maxT > minT)) maxT = minT + 1;
  const pad = Math.max((maxT - minT) * 0.03, 1e-9);

  const rankValues = [...new Set(allEvents.map(ev => ev.rank).filter(v => v != null))].sort((a,b)=>a-b);
  return { events: allEvents, rows, minT, maxT: logicalEndT + pad, totalEvents: allEvents.length, rankValues, metaEndT: logicalEndT };
}

function buildViewRows(){
  if (!rawData) return [];
  const q = searchInput.value.trim().toLowerCase();
  const mode = sortMode.value;
  const selectedRank = rankFilter.value;

  const filteredEvents = rawData.events
    .filter(ev => selectedRank === 'all' || String(ev.rank) === selectedRank)
    .filter(ev => passesConfidenceFilter(ev))
    .filter(ev => !maskedGroupKeys.has(displayGroupKey(ev)));

  let baseRows = groupEventsForDisplay(filteredEvents);

  if (mode === 'alpha') {
    baseRows.sort((a,b) => `${a.name}|${a.file}|${a.line}`.localeCompare(`${b.name}|${b.file}|${b.line}`));
  } else {
    baseRows.sort((a,b) => a._firstStart !== b._firstStart ? a._firstStart - b._firstStart : a._firstSeq - b._firstSeq);
  }

  if (mode === 'instance') {
    const out = rawData.events
      .filter(ev => selectedRank === 'all' || String(ev.rank) === selectedRank)
      .filter(ev => passesConfidenceFilter(ev))
      .filter(ev => !maskedGroupKeys.has(displayGroupKey(ev)))
      .map(ev => ({
        type:'child',
        key:`track:${ev._seq}`,
        parentKey:'',
        label:ev.name || 'unnamed',
        short:ev.function || '',
        addr:ev.addr || '',
        color:colorForKey(ev.name || ev.addr),
        rows:[ev],
        group:null,
        _firstSeq: ev._seq,
        _firstStart: Number.isFinite(ev.start) ? ev.start : Number.POSITIVE_INFINITY,
        _match: q ? eventMatches(ev, q) : false
      }));
    out.sort((a,b) => a._firstStart - b._firstStart);
    return out;
  }

  const out = [];
  for (const g of baseRows){
    const key = `group:${g._groupKey}`;
    const byAlloc = new Map();
    for (const ev of g.rows){
      const ak = allocIdentityKey(ev);
      if (!byAlloc.has(ak)) byAlloc.set(ak, []);
      byAlloc.get(ak).push(ev);
    }

    let allocRows = [...byAlloc.entries()].map(([ak, events]) => {
      const first = events[0] || {};
      return {
        type:'child',
        key:`${key}|${ak}`,
        parentKey:key,
        label:first.name || g.name || 'unnamed',
        short:first.function || '',
        addr:first.addr || '',
        color:g._color,
        rows:events,
        group:g,
        _firstSeq: Math.min(...events.map(ev => ev._seq ?? Number.MAX_SAFE_INTEGER)),
        _firstStart: Math.min(...events.map(ev => Number.isFinite(ev.start) ? ev.start : Number.POSITIVE_INFINITY)),
        _match: q ? events.some(ev => eventMatches(ev, q)) : false
      };
    });

    allocRows.sort((a,b) => {
      if (mode === 'first') return a._firstStart !== b._firstStart ? a._firstStart - b._firstStart : a._firstSeq - b._firstSeq;
      const ea = a.rows[0] || {};
      const eb = b.rows[0] || {};
      const sa = ea.start ?? -Infinity;
      const sb = eb.start ?? -Infinity;
      return sa !== sb ? sa - sb : String(ea.addr || '').localeCompare(String(eb.addr || ''));
    });

    const expanded = expandedCounts.get(key) || 0;
    const visibleCount = Math.min(expanded, allocRows.length);
    const hiddenCount = Math.max(0, allocRows.length - visibleCount);
    const groupMatch = q ? g.rows.some(ev => eventMatches(ev, q)) : false;

    out.push({ type:'group', key, label:g.name, color:g._color, group:g, rows:g.rows, allocRows, hiddenCount, _match: groupMatch });
    for (let i = 0; i < visibleCount; i++) out.push(allocRows[i]);
    if (hiddenCount > 0 && visibleCount > 0) {
      out.push({
        type:'more',
        key:`${key}|__more__|${visibleCount}`,
        parentKey:key,
        label:`Show ${Math.min(UNROLL_STEP, hiddenCount)} more`,
        remaining:hiddenCount,
        color:g._color,
        group:g,
        rows:[],
        _match:false
      });
    }
  }
  return out;
}

function setSummary(){
  if (!rawData){
    summaryEl.textContent = '';
    matchCountEl.textContent = '';
    return;
  }
  const totalEvents = rawData.totalEvents ?? rawData.events.length;
  const visibleEvents = renderedRows.reduce((a,r)=>a + r.rows.length, 0);
  const q = searchInput.value.trim().toLowerCase();
  const matchCount = q ? renderedRows.filter(r => r._match).length : 0;
  summaryEl.textContent = `${rawData.rows.length} groups · ${totalEvents} events · showing ${renderedRows.length} rows / ${visibleEvents} events · t=[${fmtTime(timeMin)}, ${fmtTime(timeMax)}]`;
  matchCountEl.textContent = q ? `${matchCount} match${matchCount === 1 ? '' : 'es'}` : '';
}

function computeLeftInnerWidth(){
  const measurer = document.createElement('div');
  measurer.style.position = 'fixed';
  measurer.style.left = '-100000px';
  measurer.style.top = '0';
  measurer.style.visibility = 'hidden';
  measurer.style.pointerEvents = 'none';
  measurer.style.background = 'transparent';
  document.body.appendChild(measurer);

  let maxWidth = leftBody.clientWidth;

  for (const row of renderedRows){
    const label = document.createElement('div');
    label.className = `rowLabel ${row.type === 'group' ? 'groupRow' : 'childRow'}`;
    label.style.position = 'relative';
    label.style.width = 'max-content';
    label.style.minWidth = '0';

    const control = document.createElement('span');
    control.className = 'togglePlaceholder';
    label.appendChild(control);

    const sw = document.createElement('span');
    sw.className = 'swatch';
    label.appendChild(sw);

    const txt = document.createElement('div');
    txt.className = 'leftText';
    if (row.type === 'more') {
      txt.innerHTML = `<div class="name moreRowHint">${escapeHtml(row.label)} <span class="badge">${row.remaining}</span></div>`;
    } else {
      const parts = splitDisplayName(row.label);
      txt.innerHTML = `<div class="name"><span class="nameMain">${escapeHtml(parts.main)}${parts.suffix ? `<span class="nameSuffix">${escapeHtml(parts.suffix)}</span>` : ''}</span><span class="badge">${row.type === 'group' ? row.allocRows.length : row.rows.length}</span></div>`;
    }
    label.appendChild(txt);
    measurer.appendChild(label);

    const indent = CHILD_INDENT_ALLOWANCE_PX + EXTRA_UNROLL_ALLOWANCE_PX;
    maxWidth = Math.max(maxWidth, Math.ceil(label.offsetWidth + indent));
  }

  measurer.remove();
  cachedLeftInnerWidth = maxWidth;
  leftWidthDirty = false;
}

function renderTicks(){
  const totalW = Math.max(rightBody.clientWidth, getDisplaySpan() * pxPerTime);
  tickContent.innerHTML = '';
  tickContent.style.width = `${totalW}px`;

  const span = getDisplaySpan();
  const idealPx = 130;
  const idealStep = span / Math.max(1, Math.floor(totalW / idealPx));
  const pow10 = Math.pow(10, Math.floor(Math.log10(idealStep || 1)));
  const norm = idealStep / pow10;
  const mult = norm < 1.5 ? 1 : norm < 3 ? 2 : norm < 7 ? 5 : 10;
  const step = mult * pow10;

  const visibleLeftPx = Math.max(0, rightBody.scrollLeft - TICK_BUFFER_PX);
  const visibleRightPx = Math.min(totalW, rightBody.scrollLeft + rightBody.clientWidth + TICK_BUFFER_PX);
  const visibleMinT = timeMin + visibleLeftPx / Math.max(pxPerTime, 1e-12);
  const visibleMaxT = timeMin + visibleRightPx / Math.max(pxPerTime, 1e-12);

  const first = Math.ceil(visibleMinT / step) * step;
  for (let t = first; t <= visibleMaxT + step * 0.5; t += step){
    const x = (t - timeMin) * pxPerTime;
    const line = document.createElement('div');
    line.className = 'gridLine';
    line.style.left = `${x}px`;
    tickContent.appendChild(line);

    const lab = document.createElement('div');
    lab.className = 'tickLabel';
    lab.style.left = `${x}px`;
    lab.textContent = fmtTime(t);
    tickContent.appendChild(lab);
  }
  tickContent.style.transform = `translateX(${-rightBody.scrollLeft}px)`;

  const logicalEndX = Number.isFinite(metaEndT) ? (metaEndT - timeMin) * pxPerTime : totalW;
  const headerShadeLeft = Math.max(0, logicalEndX - rightBody.scrollLeft);
  const headerShadeWidth = Math.max(0, totalW - logicalEndX);
  headerEndShade.style.left = `${headerShadeLeft}px`;
  headerEndShade.style.width = `${headerShadeWidth}px`;

  bodyEndShade.style.left = `${logicalEndX}px`;
  bodyEndShade.style.width = `${Math.max(0, totalW - logicalEndX)}px`;
}

function showTooltip(html, x, y){
  tooltip.innerHTML = html;
  tooltip.style.opacity = '1';
  const margin = 12;
  const offset = 14;
  const rect = tooltip.getBoundingClientRect();
  let left = x + offset;
  let top = y + offset;
  if (left + rect.width > window.innerWidth - margin) left = Math.max(margin, x - rect.width - offset);
  if (top + rect.height > window.innerHeight - margin) top = Math.max(margin, y - rect.height - offset);
  tooltip.style.left = `${left}px`;
  tooltip.style.top = `${top}px`;
}


function hideTooltip(){
  if (hoverTimer){
    clearTimeout(hoverTimer);
    hoverTimer = null;
  }
  tooltip.style.opacity = '0';
}

function renderRows(){
  renderedRows = buildViewRows();
  setSummary();
  if (leftWidthDirty || cachedLeftInnerWidth == null) computeLeftInnerWidth();

  leftInner.innerHTML = '';
  timelineLayer.innerHTML = '';
  timelineLayer.appendChild(bodyEndShade);
  timelineLayer.appendChild(bodySelection);

  const totalH = Math.max(1, renderedRows.length * PX_PER_ROW);
  leftInner.style.height = `${totalH}px`;
  leftInner.style.width = `${Math.max(leftBody.clientWidth, cachedLeftInnerWidth || 0)}px`;
  timelineLayer.style.height = `${totalH}px`;

  const contentW = Math.max(rightBody.clientWidth, getDisplaySpan() * pxPerTime);
  timelineLayer.style.width = `${contentW}px`;

  const scrollTop = bodyScroller.scrollTop;
  const viewTop = Math.max(0, scrollTop - ROW_BUFFER_PX);
  const viewBottom = scrollTop + bodyScroller.clientHeight + ROW_BUFFER_PX;
  const startIdx = Math.max(0, Math.floor(viewTop / PX_PER_ROW));
  const endIdx = Math.min(renderedRows.length, Math.ceil(viewBottom / PX_PER_ROW));

  for (let i = startIdx; i < endIdx; i++){
    const row = renderedRows[i];
    const y = i * PX_PER_ROW;

    const label = document.createElement('div');
    label.className = `rowLabel ${row.type === 'group' ? 'groupRow' : 'childRow'}${row._match ? ' matchRow' : ''}`;
    label.style.position = 'absolute';
    label.style.left = '0';
    label.style.top = `${y}px`;
    label.style.height = `${PX_PER_ROW}px`;
    label.style.width = 'max-content';
    label.style.minWidth = '100%';

    const control = document.createElement('span');
    control.className = 'togglePlaceholder';
    label.appendChild(control);

    if (row.type === 'group' && row.allocRows.length > 1){
      const btn = document.createElement('button');
      btn.className = 'toggleBtn';
      btn.textContent = (expandedCounts.get(row.key) || 0) > 0 ? '−' : '+';
      btn.addEventListener('click', () => {
        const cur = expandedCounts.get(row.key) || 0;
        expandedCounts.set(row.key, cur > 0 ? 0 : Math.min(UNROLL_STEP, row.allocRows.length));
        scheduleRenderAll();
      });
      label.replaceChild(btn, control);
    }

    const sw = document.createElement('span');
    sw.className = 'swatch';
    sw.style.background = row.color;
    if (row.rows?.some(ev => ev.end == null)) sw.classList.add('leak');

    const confLevels = (row.rows || []).map(ev => ev.track_kind === 'reuse' ? (ev.inferred_confidence || 'low') : 'high');
    if (confLevels.every(c => c === 'low')) sw.classList.add('lowConfidence');
    else if (confLevels.every(c => c === 'medium' || c === 'low')) sw.classList.add('mediumConfidence');

    label.appendChild(sw);

    const txt = document.createElement('div');
    txt.className = 'leftText';

    if (row.type === 'more'){
      txt.innerHTML = `<div class="name moreRowHint">${escapeHtml(row.label)} <span class="badge">${row.remaining}</span></div>`;
      label.appendChild(txt);
      label.addEventListener('click', () => {
        const cur = expandedCounts.get(row.parentKey) || 0;
        expandedCounts.set(row.parentKey, cur + UNROLL_STEP);
        scheduleRenderAll();
      });
      leftInner.appendChild(label);

      const tlRow = document.createElement('div');
      tlRow.className = `timelineRow${row._match ? ' matchRow' : ''}`;
      tlRow.style.position = 'absolute';
      tlRow.style.left = '0';
      tlRow.style.right = '0';
      tlRow.style.top = `${y}px`;
      tlRow.style.height = `${PX_PER_ROW}px`;
      tlRow.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        const first = row.rows?.[0] || {};
        openContextMenu(e.clientX, e.clientY, getRowPath(row), first.addr || '', row.group?._groupKey || displayGroupKey(first) || '', first.directive_text || row.group?.directive_text || '');
      });
      timelineLayer.appendChild(tlRow);
      continue;
    }

    const parts = splitDisplayName(row.label);
    txt.innerHTML = `<div class="name" title="${escapeHtml(getRowPath(row))}"><span class="nameMain">${escapeHtml(parts.main)}${parts.suffix ? `<span class="nameSuffix">${escapeHtml(parts.suffix)}</span>` : ''}</span><span class="badge">${row.type === 'group' ? row.allocRows.length : row.rows.length}</span></div>`;
    label.appendChild(txt);
    label.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      const first = row.rows?.[0] || {};
      openContextMenu(
        e.clientX,
        e.clientY,
        getRowPath(row),
        first.addr || '',
        row.group?._groupKey || displayGroupKey(first) || '',
        first.directive_text || row.group?.directive_text || ''
      );
    });
    leftInner.appendChild(label);

    const tlRow = document.createElement('div');
    tlRow.className = `timelineRow${row._match ? ' matchRow' : ''}`;
    tlRow.style.position = 'absolute';
    tlRow.style.left = '0';
    tlRow.style.right = '0';
    tlRow.style.top = `${y}px`;
    tlRow.style.height = `${PX_PER_ROW}px`;
    tlRow.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      const first = row.rows?.[0] || {};
      openContextMenu(e.clientX, e.clientY, getRowPath(row), first.addr || '', row.group?._groupKey || displayGroupKey(first) || '', first.directive_text || row.group?.directive_text || '');
    });

    for (const ev of row.rows){
      const start = Number.isFinite(ev.start) ? ev.start : timeMin;
      const end = getEventEnd(ev);
      const left = (start - timeMin) * pxPerTime;
      const width = Math.max(2, (end - start) * pxPerTime);
      const bar = document.createElement('div');
      const hasNoEnd = ev.end == null;
      const confidenceClass = ev.track_kind === 'reuse'
        ? (ev.inferred_confidence === 'low' ? 'lowConfidence' : ev.inferred_confidence === 'medium' ? 'mediumConfidence' : '')
        : '';
      bar.className = `eventBar ${row.type === 'group' ? 'aggregate' : ''} ${hasNoEnd ? 'noEnd' : ''} ${confidenceClass}`;
      bar.style.left = `${left}px`;
      bar.style.width = `${width}px`;
      const fill = getEventColor(ev, row);
      bar.style.background = fill;
      bar.style.borderColor = hasNoEnd ? '#dc2626' : borderColorForFill(fill);
      bar.textContent = row.type === 'group' ? '' : fmtBytes(ev.size);
      bar.addEventListener('mousemove', (e) => {
        if (hoverRAF) cancelAnimationFrame(hoverRAF);
        hoverRAF = requestAnimationFrame(() => {
          hoverX = e.clientX;
          hoverY = e.clientY;
          hoverHTML = getEventTooltip(ev, row);
          if (hoverTimer) clearTimeout(hoverTimer);
          hoverTimer = setTimeout(() => {
            showTooltip(hoverHTML, hoverX, hoverY);
          }, 90);
        });
      });
      bar.addEventListener('mouseleave', hideTooltip);
      tlRow.appendChild(bar);
    }
    timelineLayer.appendChild(tlRow);
  }
}

function syncBottomScrollbar(){
  const w = Math.max(rightBody.clientWidth, (timeMax - timeMin) * pxPerTime);
  bottomScrollInner.style.width = `${w}px`;
  bottomScrollWrap.scrollLeft = rightBody.scrollLeft;
  const leftW = Math.max(leftBody.clientWidth, leftInner.scrollWidth);
  leftBottomScrollInner.style.width = `${leftW}px`;
  leftBottomScrollWrap.scrollLeft = leftBody.scrollLeft;
  bodySelection.style.height = `${timelineLayer.offsetHeight}px`;
}

function scrollToFirstMatch(){
  const idx = renderedRows.findIndex(r => r._match);
  if (idx < 0) return;
  const target = Math.max(0, idx * PX_PER_ROW - bodyScroller.clientHeight * 0.25);
  bodyScroller.scrollTop = target;
}

function renderAll(){
  renderRows();
  renderTicks();
  syncBottomScrollbar();
  if (pendingSearchFocus) {
    pendingSearchFocus = false;
    scrollToFirstMatch();
  }
}

function scheduleRenderAll(){
  if (renderRAF != null) return;
  renderRAF = requestAnimationFrame(() => {
    renderRAF = null;
    renderAll();
  });
}

function fitToWindow(){
  const span = Math.max(1e-12, timeMax - timeMin);
  pxPerTime = rightBody.clientWidth / span;
  renderAll();
}

function zoomBy(factor, anchorClientX = null){
  if (!rawData) return;
  const oldPxPerTime = pxPerTime;
  const viewportLeft = rightBody.getBoundingClientRect().left;
  const viewportWidth = rightBody.clientWidth;
  const anchorOffset = anchorClientX == null
    ? viewportWidth / 2
    : Math.max(0, Math.min(viewportWidth, anchorClientX - viewportLeft));
  const anchorTime = timeMin + (rightBody.scrollLeft + anchorOffset) / Math.max(oldPxPerTime, 1e-12);
  const newPxPerTime = Math.max(1e-12, oldPxPerTime * factor);
  const maxScrollLeft = Math.max(0, getDisplaySpan() * newPxPerTime - viewportWidth);
  const targetScrollLeft = Math.max(0, Math.min(maxScrollLeft, (anchorTime - timeMin) * newPxPerTime - anchorOffset));
  pxPerTime = newPxPerTime;
  renderAll();
  rightBody.scrollLeft = targetScrollLeft;
  tickContent.style.transform = `translateX(${-rightBody.scrollLeft}px)`;
  syncBottomScrollbar();
}

function setSelectionOverlay(startContentX, endContentX){
  const left = Math.min(startContentX, endContentX);
  const width = Math.abs(endContentX - startContentX);
  headerSelection.style.left = `${left - rightBody.scrollLeft}px`;
  headerSelection.style.width = `${width}px`;
  bodySelection.style.left = `${left}px`;
  bodySelection.style.width = `${width}px`;
}

function clearSelectionOverlay(){
  dragZoom = null;
  headerSelection.classList.add('hidden');
  bodySelection.classList.add('hidden');
}

function applySelectionZoom(){
  if (!dragZoom || !rawData) return;
  const a = Math.min(dragZoom.startContentX, dragZoom.currentContentX);
  const b = Math.max(dragZoom.startContentX, dragZoom.currentContentX);
  const dx = b - a;
  if (dx < MIN_DRAG_PX) return clearSelectionOverlay();
  const t0 = timeMin + a / Math.max(pxPerTime, 1e-12);
  const t1 = timeMin + b / Math.max(pxPerTime, 1e-12);
  const span = Math.max(1e-12, t1 - t0);
  const pad = span * 0.05;
  const zoomStart = t0 - pad;
  const zoomEnd = t1 + pad;
  const clampedStart = Math.max(timeMin, zoomStart);
  const clampedEnd = Math.min(timeMax, zoomEnd);
  const newSpan = Math.max(1e-12, clampedEnd - clampedStart);
  const newPxPerTime = rightBody.clientWidth / newSpan;
  const targetScrollLeft = Math.max(0, Math.min(Math.max(0, getDisplaySpan() * newPxPerTime - rightBody.clientWidth), (clampedStart - timeMin) * newPxPerTime));
  pxPerTime = newPxPerTime;
  renderAll();
  rightBody.scrollLeft = targetScrollLeft;
  tickContent.style.transform = `translateX(${-rightBody.scrollLeft}px)`;
  syncBottomScrollbar();
  clearSelectionOverlay();
}

function populateRankFilter(){
  const current = rankFilter.value || 'all';
  rankFilter.innerHTML = '';
  const allOpt = document.createElement('option');
  allOpt.value = 'all';
  allOpt.textContent = 'all';
  rankFilter.appendChild(allOpt);
  for (const r of (rawData?.rankValues || [])){
    const opt = document.createElement('option');
    opt.value = String(r);
    opt.textContent = String(r);
    rankFilter.appendChild(opt);
  }
  rankFilter.value = [...rankFilter.options].some(o => o.value === current) ? current : 'all';
}

rightBody.addEventListener('wheel', (e) => {
  if (!rawData) return;
  if (e.ctrlKey || e.metaKey){
    e.preventDefault();
    zoomBy(e.deltaY < 0 ? 1.15 : 1 / 1.15, e.clientX);
    return;
  }
  if (e.altKey){
    e.preventDefault();
    rightBody.scrollLeft += e.deltaY;
    tickContent.style.transform = `translateX(${-rightBody.scrollLeft}px)`;
    bottomScrollWrap.scrollLeft = rightBody.scrollLeft;
    scheduleRenderAll();
  }
}, { passive:false });

function beginDragZoom(clientX, viewportRect){
  const localX = Math.max(0, Math.min(viewportRect.width, clientX - viewportRect.left));
  const contentX = rightBody.scrollLeft + localX;
  dragZoom = { startContentX: contentX, currentContentX: contentX };
  headerSelection.classList.remove('hidden');
  bodySelection.classList.remove('hidden');
  setSelectionOverlay(contentX, contentX);
}

tickViewport.addEventListener('mousedown', (e) => {
  if (!rawData || e.button !== 0) return;
  e.preventDefault();
  closeContextMenu();
  closeDirectiveModal();
  beginDragZoom(e.clientX, tickViewport.getBoundingClientRect());
});

rightBody.addEventListener('mousedown', (e) => {
  if (!rawData || e.button !== 0) return;
  e.preventDefault();
  closeContextMenu();
  closeDirectiveModal();
  beginDragZoom(e.clientX, rightBody.getBoundingClientRect());
});

window.addEventListener('mousemove', (e) => {
  if (!dragZoom) return;
  const rect = rightBody.getBoundingClientRect();
  const localX = Math.max(0, Math.min(rect.width, e.clientX - rect.left));
  dragZoom.currentContentX = rightBody.scrollLeft + localX;
  setSelectionOverlay(dragZoom.startContentX, dragZoom.currentContentX);
});

window.addEventListener('mouseup', (e) => {
  if (!dragZoom) return;
  if (e.button === 2) return clearSelectionOverlay();
  if (e.button === 0) applySelectionZoom();
});

tickViewport.addEventListener('contextmenu', (e) => {
  if (dragZoom){
    e.preventDefault();
    clearSelectionOverlay();
  }
});

rightBody.addEventListener('contextmenu', (e) => {
  if (dragZoom){
    e.preventDefault();
    clearSelectionOverlay();
  }
});

rightBody.addEventListener('scroll', () => {
  hideTooltip();
  tickContent.style.transform = `translateX(${-rightBody.scrollLeft}px)`;
  bottomScrollWrap.scrollLeft = rightBody.scrollLeft;
  if (dragZoom) setSelectionOverlay(dragZoom.startContentX, dragZoom.currentContentX);
  scheduleRenderAll();
});

rightBody.addEventListener('mouseleave', hideTooltip);

timelineLayer.addEventListener('mouseleave', hideTooltip);

window.addEventListener('mousemove', (e) => {
  if (tooltip.style.opacity !== '1') return;
  const rect = rightBody.getBoundingClientRect();
  const inside = e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom;
  if (!inside) hideTooltip();
});

bodyScroller.addEventListener('scroll', scheduleRenderAll);
leftBody.addEventListener('scroll', () => { leftBottomScrollWrap.scrollLeft = leftBody.scrollLeft; });
leftBottomScrollWrap.addEventListener('scroll', () => {
  if (leftBody.scrollLeft !== leftBottomScrollWrap.scrollLeft) leftBody.scrollLeft = leftBottomScrollWrap.scrollLeft;
  scheduleRenderAll();
});
bottomScrollWrap.addEventListener('scroll', () => {
  if (rightBody.scrollLeft !== bottomScrollWrap.scrollLeft){
    rightBody.scrollLeft = bottomScrollWrap.scrollLeft;
    tickContent.style.transform = `translateX(${-rightBody.scrollLeft}px)`;
  }
  scheduleRenderAll();
});

searchInput.addEventListener('input', () => {
  pendingSearchFocus = searchInput.value.trim() !== '';
  clearSearchBtn.classList.toggle('hidden', searchInput.value.trim() === '');
  scheduleRenderAll();
});
clearSearchBtn.addEventListener('click', () => {
  searchInput.value = '';
  pendingSearchFocus = false;
  clearSearchBtn.classList.add('hidden');
  scheduleRenderAll();
});
sortMode.addEventListener('change', () => {
  if (sortMode.value !== 'alpha' && sortMode.value !== 'first') expandedCounts = new Map();
  leftWidthDirty = true;
  scheduleRenderAll();
});
rankFilter.addEventListener('change', () => {
  expandedCounts = new Map();
  leftWidthDirty = true;
  scheduleRenderAll();
});
confidenceFilter.addEventListener('change', () => {
  scheduleRenderAll();
});
zoomInBtn.addEventListener('click', () => zoomBy(1.25));
zoomOutBtn.addEventListener('click', () => zoomBy(1 / 1.25));
fitBtn.addEventListener('click', fitToWindow);
window.addEventListener('resize', () => {
  if (!rawData) return;
  scheduleRenderAll();
  if (dragZoom) setSelectionOverlay(dragZoom.startContentX, dragZoom.currentContentX);
});

document.addEventListener('click', () => closeContextMenu());
document.addEventListener('scroll', () => closeContextMenu(), true);
document.addEventListener('contextmenu', (e) => {
  if (dragZoom) return;
  if (!e.target.closest('.rowLabel') && !e.target.closest('.timelineRow')) closeContextMenu();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    clearSelectionOverlay();
    closeContextMenu();
    closeDirectiveModal();
  }
});
directiveModal.addEventListener('click', (e) => {
  if (e.target === directiveModal) closeDirectiveModal();
});
copyPathBtn.addEventListener('click', async () => {
  const ok = await copyText(contextPath);
  closeContextMenu();
  if (!ok) alert('Failed to copy path');
});
copyAddrBtn.addEventListener('click', async () => {
  const ok = await copyText(contextAddr);
  closeContextMenu();
  if (!ok) alert('Failed to copy data address');
});
maskOccurrencesBtn.addEventListener('click', () => {
  if (contextMaskKey) maskedGroupKeys.add(contextMaskKey);
  closeContextMenu();
  leftWidthDirty = true;
  scheduleRenderAll();
});
inspectDirectiveBtn.addEventListener('click', () => {
  closeContextMenu();
  openDirectiveModal(contextDirective || 'No ACC directive text available for this entry.');
});
copyDirectiveBtn.addEventListener('click', async () => {
  const ok = await copyText(directiveText.textContent || '');
  if (!ok) alert('Failed to copy ACC directive');
});
closeDirectiveBtn.addEventListener('click', closeDirectiveModal);

fileInput.addEventListener('change', async (e) => {
  const file = e.target.files?.[0];
  if (!file) return;
  try {
    const parsed = JSON.parse(await file.text());
    rawData = normalizeData(parsed);
    timeMin = rawData.minT;
    timeMax = rawData.maxT;
    metaEndT = rawData.metaEndT;
    expandedCounts = new Map();
    maskedGroupKeys = new Set();
    leftWidthDirty = true;
    populateRankFilter();
    clearSearchBtn.classList.toggle('hidden', searchInput.value.trim() === '');
    fitToWindow();
  } catch (err) {
    alert(`Failed to load JSON: ${err.message}`);
  }
});
</script>
</body>
</html>
